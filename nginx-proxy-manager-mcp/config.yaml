name: Nginx Proxy Manager MCP
version: "0.4.0"
slug: nginx_proxy_manager_mcp
description: MCP server for Nginx Proxy Manager – allows AI assistants to manage NPM via the Model Context Protocol
url: "https://github.com/DanielWeeber/nginx-proxy-manager-mcp-addon"
arch:
  - aarch64
  - amd64
init: false
startup: services
ports:
  9115/tcp: 9115
ports_description:
  9115/tcp: MCP HTTP Server
options:
  npm_api_url: "http://192.168.1.1:81/api"
  npm_identity: "admin@example.com"
  npm_secret: "changeme"
  mcp_port: 9115
  mcp_host: "0.0.0.0"
  npm_proxy_defaults: ""
schema:
  npm_api_url: str
  npm_identity: str
  npm_secret: str
  mcp_port: int
  mcp_host: str
  npm_proxy_defaults: str?
