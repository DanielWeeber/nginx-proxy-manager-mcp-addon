configuration:
  npm_api_url:
    name: NPM API URL
    description: "Full URL to your Nginx Proxy Manager API, e.g. http://192.168.1.10:81/api"
  npm_identity:
    name: NPM Username / E-Mail
    description: "The email address you use to log into Nginx Proxy Manager"
  npm_secret:
    name: NPM Password
    description: "Your Nginx Proxy Manager password"
  mcp_host:
    name: MCP Listen Host
    description: "IP address for the MCP server to bind to. Leave as 0.0.0.0 to listen on all interfaces."
  mcp_port:
    name: MCP Port
    description: "TCP port the MCP HTTP server will listen on (default: 9115)"
  npm_proxy_defaults:
    name: Proxy Host Defaults (JSON)
    description: "Optional JSON string with default values for create_proxy_host"
